<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HaShop - Quản lý đơn hàng</title>

    <link rel="stylesheet" href="/assets/css/navbar.css">
    <link rel="stylesheet" href="/assets/css/admin-common.css">
    <link rel="stylesheet" href="/assets/css/admin-layout.css">
    <link rel="stylesheet" href="/assets/css/admin-orders.css">
</head>
<body>
    <div id="navbar-placeholder" data-auth-action="login"></div>

    <div class="container">
        <div class="page-header">
            <h2>Admin - Quản lý đơn hàng</h2>
            <p>Theo dõi, lọc và cập nhật trạng thái đơn hàng.</p>
        </div>

        <p id="message" class="message"></p>

        <div class="table-section orders-filter-section">
            <div class="section-head">
                <h3>Bộ lọc đơn hàng</h3>
                <span class="section-note">Tìm nhanh theo mã đơn, người nhận, địa chỉ hoặc trạng thái.</span>
            </div>

            <div class="filter-bar section-filter-bar">
                <div class="filter-group">
                    <span class="filter-label">Tìm kiếm</span>
                    <input
                        id="orderSearchInput"
                        class="filter-input"
                        placeholder="Mã đơn, người nhận, SĐT, địa chỉ..."
                    >
                </div>

                <div class="filter-group">
                    <span class="filter-label">Trạng thái đơn</span>
                    <select id="orderStatusFilter" class="filter-select">
                        <option value="">Tất cả</option>
                        <option value="PENDING_PAYMENT">Chờ thanh toán</option>
                        <option value="CONFIRMED">Đã xác nhận</option>
                        <option value="SHIPPING">Đang giao hàng</option>
                        <option value="COMPLETED">Hoàn thành</option>
                        <option value="CANCELLED">Đã hủy</option>
                    </select>
                </div>

                <div class="filter-group">
                    <span class="filter-label">Thanh toán</span>
                    <select id="paymentStatusFilter" class="filter-select">
                        <option value="">Tất cả</option>
                        <option value="PENDING">Chờ xử lý</option>
                        <option value="PAID">Đã thanh toán</option>
                        <option value="FAILED">Thất bại</option>
                        <option value="UNPAID">Chưa thanh toán</option>
                    </select>
                </div>

                <button id="resetOrderFiltersBtn" type="button" class="filter-btn-reset">
                    Xóa lọc
                </button>
            </div>
        </div>

        <div id="admin-orders-content" class="loading">
            Đang tải danh sách đơn hàng...
        </div>
    </div>

    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/simple-navbar.js"></script>
    <script src="/assets/js/admin-orders.js"></script>
</body>
</html>
