<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaShop - Đăng ký</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/register.css">
</head>
<body>
    <header class="auth-header">
        <div class="auth-header-container">
            <div class="auth-logo">HASHOP</div>
            <nav class="auth-nav">
                <a href="login.html" class="auth-btn-register">Đăng nhập</a>
            </nav>
        </div>
    </header>

    <div class="auth-wrapper">
        <div class="auth-left">
            <div class="auth-overlay"></div>
            <div class="auth-left-content">
                <h1 class="auth-brand">HASHOP</h1>
                <p class="auth-tagline">THỜI TRANG CHO MỌI PHONG CÁCH</p>
                <p class="auth-description">Khám phá những bộ sưu tập mới nhất với thiết kế hiện đại và trải nghiệm mua sắm tiện lợi.</p>
            </div>
        </div>

        <div class="auth-right">
            <div class="auth-form-container">
                <h2 class="auth-title">Tạo tài khoản</h2>
                <p class="auth-subtitle">Đăng ký để bắt đầu mua sắm tại HaShop.</p>

                <form id="register-form" class="auth-form">
                    <div class="input-group">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="reg-name" placeholder="Họ tên" class="auth-input">
                    </div>

                    <div class="input-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="reg-email" placeholder="Email" class="auth-input">
                    </div>

                    <div class="input-group">
                        <i class="fas fa-phone input-icon"></i>
                        <input type="tel" id="reg-phone" placeholder="Số điện thoại" class="auth-input">
                    </div>

                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="reg-password" placeholder="Mật khẩu" class="auth-input">
                        <button type="button" class="password-toggle" id="toggle-password1">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="reg-confirm-password" placeholder="Xác nhận mật khẩu" class="auth-input">
                        <button type="button" class="password-toggle" id="toggle-password2">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>

                    <button type="submit" class="auth-btn">Đăng ký</button>
                </form>

                <div id="register-message" class="message"></div>

                <p class="auth-footer">
                    Đã có tài khoản? <a href="login.html">Đăng nhập</a>
                </p>
            </div>
        </div>
    </div>

    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/register.js"></script>
</body>
</html>
