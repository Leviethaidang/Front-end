<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HaShop - Đăng ký</title>

    <link rel="stylesheet" href="/assets/css/navbar.css">
    <link rel="stylesheet" href="/assets/css/register.css">
    <link rel="stylesheet" href="/assets/css/footer.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="register-page">
        <div class="form-box">
            <h2>Đăng ký tài khoản</h2>

            <form id="register-form">
                <input id="reg-name" placeholder="Họ và tên">

                <input id="reg-email" type="email" placeholder="Email">

                <input id="reg-phone" placeholder="Số điện thoại, ví dụ +84901234567">
                <div class="hint">Số điện thoại nên dùng định dạng quốc tế</div>

                <input id="reg-password" type="password" placeholder="Mật khẩu">

                <button id="register-button" type="submit">
                    Đăng ký
                </button>
            </form>

            <div id="otp-box" class="otp-box">
                <hr>

                <p>Nhập mã xác nhận được gửi về email/số điện thoại:</p>

                <form id="confirm-form">
                    <input id="otp-code" placeholder="Mã xác nhận">

                    <button id="confirm-button" class="btn-blue" type="submit">
                        Xác nhận tài khoản
                    </button>
                </form>
            </div>

            <div id="register-message" class="message"></div>

            <div class="small-text">
                Đã có tài khoản?
                <a href="/login">Đăng nhập</a>
            </div>

            <a class="home-link" href="/">← Quay về trang chủ</a>
        </div>
    </div>

    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/navbar.js"></script>
    <script src="/assets/js/register.js"></script>
    <div id="footer-placeholder"></div>
    <script src="/assets/js/footer.js"></script>
</body>
</html>
