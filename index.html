<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaShop - Trang chủ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/assets/css/common.css">
    <link rel="stylesheet" href="/assets/css/navbar.css">
    <link rel="stylesheet" href="/assets/css/index.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <section class="hero-section">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6">
                    <h1 class="hero-title fw-bold mb-4">
                        Mua sắm thông minh,
                        <span class="hero-gradient">tiết kiệm hơn</span>
                    </h1>
                    <p class="hero-subtitle mb-5 text-muted">
                        Khám phá trải nghiệm mua sắm trực tuyến hiện đại với sản phẩm chất lượng, giao hàng nhanh chóng và hỗ trợ tận tình.
                    </p>
                    <div class="d-flex gap-3">
                        <a href="#products-container" class="btn btn-primary-gradient btn-lg">
                            Xem sản phẩm <i class="bi bi-arrow-right ms-2"></i>
                        </a>
                        <a href="/login" class="btn btn-outline-light btn-lg">
                            Đăng nhập
                        </a>
                    </div>
                </div>
                <div class="col-lg-6 text-center">
                    <div class="hero-image-wrapper">
                        <i class="bi bi-shop hero-icon"></i>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <main class="container py-5">
        <div class="text-center mb-5">
            <h2 class="fw-bold mb-3">Sản phẩm mới nhất</h2>
            <p class="text-muted">Danh sách sản phẩm được tải trực tiếp từ Product Service.</p>
        </div>

        <div id="products-container" class="products-grid"></div>
    </main>

    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/navbar.js"></script>
    <script src="/assets/js/index.js"></script>
</body>
</html>
