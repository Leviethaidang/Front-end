<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HaShop - Trang Chủ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #333;
            color: white;
            padding: 12px 24px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 12px;
        }

        .dropdown {
            position: relative;
            cursor: pointer;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background: white;
            min-width: 170px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            display: block;
            margin: 0;
        }

        .dropdown-content a:hover {
            background: #f1f1f1;
        }

        .show {
            display: block;
        }

        .container {
            max-width: 1200px;
            margin: 32px auto;
            padding: 0 20px;
        }

        .page-title {
            margin-bottom: 24px;
            text-align: center;
        }

        .page-title h1 {
            margin-bottom: 8px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.18);
        }

        .product-image-wrap {
            width: 100%;
            height: 220px;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .no-image {
            color: #777;
            font-size: 14px;
        }

        .product-info {
            padding: 16px;
        }

        .product-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            min-height: 44px;
        }

        .product-category {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .product-price {
            color: #d70018;
            font-size: 18px;
            font-weight: bold;
        }

        .product-stock {
            color: #555;
            font-size: 14px;
            margin-top: 8px;
        }

        .loading,
        .empty,
        .error {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .error {
            color: #c0392b;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div><strong>HaShop</strong></div>
        <div id="auth-section">
            <a href="login.html">Đăng nhập</a>
        </div>
    </div>

    <div class="container">
        <div class="page-title">
            <h1>HaShop</h1>
            <p>Danh sách sản phẩm mới nhất</p>
        </div>

        <div id="products-container" class="products-grid"></div>
    </div>

    <script>
        const accessToken = localStorage.getItem("accessToken");
        const fullName = localStorage.getItem("fullName") || "Thành viên";
        const authSection = document.getElementById("auth-section");
        const productsContainer = document.getElementById("products-container");

        if (accessToken) {
            const payload = getTokenPayload(accessToken);
            const groups = payload["cognito:groups"] || [];
            const isAdmin = groups.includes("Admin");

            authSection.innerHTML = `
                <div class="dropdown" onclick="toggleDropdown(event)">
                    <span>Xin chào, ${escapeHtml(fullName)} ▼</span>
                    <div id="dropdown-menu" class="dropdown-content">
                        <a href="profile.html">Profile</a>
                        ${isAdmin ? '<a href="admin.html">Quản lý users</a>' : ''}
                        ${isAdmin ? '<a href="admin-products.html">Quản lý sản phẩm</a>' : ''}
                        <a href="#" onclick="logout(event)">Đăng xuất</a>
                    </div>
                </div>
            `;
        }

        loadProducts();

        async function loadProducts() {
            productsContainer.innerHTML = `
                <div class="loading" style="grid-column: 1 / -1;">
                    Đang tải sản phẩm...
                </div>
            `;

            try {
                const response = await fetch("/api/products");

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Không thể tải danh sách sản phẩm");
                }

                const products = data.products || [];

                if (products.length === 0) {
                    productsContainer.innerHTML = `
                        <div class="empty" style="grid-column: 1 / -1;">
                            Chưa có sản phẩm nào.
                        </div>
                    `;
                    return;
                }

                productsContainer.innerHTML = products.map(product => createProductCard(product)).join("");

            } catch (error) {
                console.error("Lỗi tải sản phẩm:", error);

                productsContainer.innerHTML = `
                    <div class="error" style="grid-column: 1 / -1;">
                        ${escapeHtml(error.message || "Lỗi không xác định")}
                    </div>
                `;
            }
        }

        function createProductCard(product) {
            const productName = product.product_name || "Không có tên";
            const categoryName = product.category_name || "Chưa phân loại";
            const price = formatPrice(product.price);
            const stockQuantity = product.stock_quantity ?? 0;
            const imageUrl = product.imageUrl;

            const imageHtml = imageUrl
                ? `<img class="product-image" src="${escapeAttribute(imageUrl)}" alt="${escapeAttribute(productName)}">`
                : `<span class="no-image">Không có ảnh</span>`;

            return `
                <div class="product-card">
                    <div class="product-image-wrap">
                        ${imageHtml}
                    </div>
                    <div class="product-info">
                        <div class="product-name">${escapeHtml(productName)}</div>
                        <div class="product-category">${escapeHtml(categoryName)}</div>
                        <div class="product-price">${price}</div>
                        <div class="product-stock">Còn lại: ${stockQuantity}</div>
                    </div>
                </div>
            `;
        }

        function formatPrice(value) {
            const number = Number(value);

            if (Number.isNaN(number)) {
                return "Liên hệ";
            }

            return number.toLocaleString("vi-VN", {
                style: "currency",
                currency: "VND"
            });
        }

        function getTokenPayload(token) {
            try {
                const base64Payload = token.split('.')[1];
                const jsonPayload = atob(base64Payload.replace(/-/g, '+').replace(/_/g, '/'));
                return JSON.parse(jsonPayload);
            } catch {
                return {};
            }
        }

        function toggleDropdown(event) {
            event.stopPropagation();
            document.getElementById("dropdown-menu").classList.toggle("show");
        }

        function logout(event) {
            event.preventDefault();
            localStorage.clear();
            window.location.href = "index.html";
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function escapeAttribute(value) {
            return escapeHtml(value);
        }

        window.onclick = () => {
            const menu = document.getElementById("dropdown-menu");
            if (menu) menu.classList.remove("show");
        };
    </script>
</body>
</html>
