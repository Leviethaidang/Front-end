<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HaShop - Admin Products</title>

    <link rel="stylesheet" href="/assets/css/navbar.css">
    <link rel="stylesheet" href="/assets/css/admin-products.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="container">
        <div class="page-header">
            <h2>Admin - Quản lý sản phẩm</h2>
            <p>Thêm, sửa, xóa sản phẩm và quản lý ảnh sản phẩm.</p>
        </div>

        <p id="message" class="message"></p>

        <div class="box">
            <h3>Thêm sản phẩm mới</h3>

            <input id="newProductName" placeholder="Tên sản phẩm">

            <textarea id="newProductDescription" placeholder="Mô tả sản phẩm"></textarea>

            <select id="newCategoryId">
                <option value="">Chưa phân loại</option>
            </select>

            <input id="newPrice" type="number" placeholder="Giá sản phẩm, ví dụ 250000">

            <input id="newStockQuantity" type="number" placeholder="Số lượng kho, ví dụ 10">

            <input id="newProductImage" type="file" accept="image/jpeg,image/png,image/webp,image/gif">

            <img id="productPreviewImage" class="preview-img" alt="Preview">

            <button id="createProductBtn" class="btn btn-green">
                Tạo sản phẩm
            </button>
        </div>

        <div class="table-section">
            <h3>Danh sách sản phẩm</h3>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Ảnh</th>
                        <th>Tên sản phẩm</th>
                        <th>Category</th>
                        <th>Giá</th>
                        <th>Tồn kho</th>
                        <th>Đã bán</th>
                        <th>Mô tả</th>
                        <th>Đổi ảnh</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>

                <tbody id="productTableBody">
                    <tr>
                        <td colspan="10">Đang tải...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/navbar.js"></script>
    <script src="/assets/js/admin-products.js"></script>
</body>
</html>
