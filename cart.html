<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaShop - Giỏ hàng</title>
    <meta name="description" content="Xem và quản lý giỏ hàng của bạn tại HaShop. Kiểm tra sản phẩm, số lượng và tiến hành thanh toán.">
    
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="/assets/font/bootstrap-icons-1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .cart-item-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <main>
        <section class="mt-50 mb-100 cart-section">
            <div class="container">
                <div class="row mb-4">
                    <div class="col-12 text-center">
                        <h1 class="page-title mb-2">Giỏ hàng của bạn</h1>
                        <p class="text-muted">Kiểm tra sản phẩm và tiến hành đặt hàng</p>
                    </div>
                </div>

                <div id="message" class="message text-center mb-4 text-danger"></div>

                <div id="cart-content" class="loading text-center py-5">
                    <div class="spinner-border text-success" role="status">
                        <span class="visually-hidden">Đang tải giỏ hàng...</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/assets/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/common.js"></script>
    <script src="/assets/js/navbar.js"></script>
    <script src="/assets/js/cart.js"></script>
    <script src="/assets/js/footer.js"></script>
</body>
</html>
