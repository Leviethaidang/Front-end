<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaShop - Chỉnh sửa hồ sơ</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/navbar.css">
    <link rel="stylesheet" href="/assets/css/edit-profile.css">
</head>
<body>
    <div id="simple-navbar-placeholder" data-auth-action="login"></div>

    <main class="main-container">
        <div class="profile-wrapper">
            <div class="page-header">
                <a href="/profile" class="back-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 18L9 12L15 6" stroke="#5C3B23" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Quay lại
                </a>
                <h1>Chỉnh sửa hồ sơ</h1>
                <p>Cập nhật thông tin tài khoản của bạn</p>
            </div>

            <div class="profile-card">
                <div id="edit-profile-message" class="message"></div>
                <form id="edit-profile-form">
                    <div class="form-section">
                        <div class="form-row">
                            <div class="form-group full-width">
                                <label for="edit-name">Họ tên</label>
                                <input type="text" id="edit-name">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="edit-email">Email</label>
                                <input type="email" id="edit-email" disabled>
                            </div>
                            <div class="form-group">
                                <label for="edit-phone">Số điện thoại</label>
                                <input type="tel" id="edit-phone">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="edit-birthday">Ngày sinh</label>
                                <input type="date" id="edit-birthday" disabled>
                            </div>
                            <div class="form-group">
                                <label for="edit-gender">Giới tính</label>
                                <select id="edit-gender" disabled>
                                    <option value="male">Nam</option>
                                    <option value="female">Nữ</option>
                                    <option value="other">Khác</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group full-width">
                                <label for="edit-address">Địa chỉ</label>
                                <textarea id="edit-address" rows="3"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <a href="/profile" class="btn btn-secondary">Hủy</a>
                        <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                    </div>
                </form>
            </div>

            <section class="profile-card payment-card">
                <div class="payment-section-header">
                    <div>
                        <h2>Phương thức thanh toán</h2>
                        <p>Liên kết, đặt mặc định hoặc xóa phương thức thanh toán của bạn.</p>
                    </div>
                </div>

                <div class="payment-add-box">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="paymentType">Loại phương thức thanh toán</label>
                            <select id="paymentType">
                                <option value="MOMO">MoMo</option>
                                <option value="BANK">Ngân hàng</option>
                            </select>
                        </div>
                    </div>

                    <div id="momoFields" class="form-row">
                        <div class="form-group full-width">
                            <label for="momoPhoneNumber">Số điện thoại MoMo</label>
                            <input id="momoPhoneNumber" placeholder="+84901234567">
                        </div>
                    </div>

                    <div id="bankFields" class="payment-hidden">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="bankName">Ngân hàng</label>
                                <select id="bankName">
                                    <option value="">-- Chọn ngân hàng --</option>
                                    <option value="Vietcombank">Vietcombank</option>
                                    <option value="Techcombank">Techcombank</option>
                                    <option value="ACB">ACB</option>
                                    <option value="BIDV">BIDV</option>
                                    <option value="VietinBank">VietinBank</option>
                                    <option value="MB Bank">MB Bank</option>
                                    <option value="VPBank">VPBank</option>
                                    <option value="Sacombank">Sacombank</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="bankAccountNumber">Số tài khoản</label>
                                <input id="bankAccountNumber" placeholder="Nhập số tài khoản">
                            </div>
                        </div>
                    </div>

                    <button id="addPaymentMethodBtn" type="button" class="btn btn-primary">
                        Liên kết phương thức thanh toán
                    </button>

                    <p id="payment-message-box" class="message"></p>
                </div>

                <div class="payment-list-header">
                    <h3>Danh sách phương thức thanh toán</h3>
                </div>
                <div id="payment-methods-box" class="payment-methods-box">
                    Đang tải phương thức thanh toán...
                </div>
            </section>
        </div>
    </main>

    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/simple-navbar.js"></script>
    <script src="/assets/js/edit-profile.js"></script>
</body>
</html>
