<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaShop - Chỉnh sửa hồ sơ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/common.css">
    <link rel="stylesheet" href="assets/css/edit-profile.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">HaShop</a>
            <div class="d-flex align-items-center gap-4">
                <a href="index.html" class="text-decoration-none">Sản phẩm</a>
                <div class="dropdown">
                    <a href="#" class="text-decoration-none d-flex align-items-center gap-2" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle fs-4"></i>
                        Nguyễn Văn A
                        <i class="bi bi-chevron-down"></i>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-dark">
                        <li><a class="dropdown-item" href="profile.html"><i class="bi bi-person me-2"></i>Hồ sơ</a></li>
                        <li><a class="dropdown-item active" href="edit-profile.html"><i class="bi bi-pencil me-2"></i>Chỉnh sửa</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="login.html"><i class="bi bi-box-arrow-left me-2"></i>Đăng xuất</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="edit-profile-section">
        <div class="container">
            <div class="page-header mb-5">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="index.html">Trang chủ</a></li>
                        <li class="breadcrumb-item"><a href="profile.html">Hồ sơ</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Chỉnh sửa</li>
                    </ol>
                </nav>
                <h1 class="fw-bold mb-2">Chỉnh sửa hồ sơ</h1>
                <p class="text-muted">Cập nhật thông tin tài khoản của bạn.</p>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card edit-card">
                        <div class="card-body p-4 p-sm-5">
                            <form id="editProfileForm">
                                <div class="row">
                                    <div class="col-md-6 mb-4">
                                        <label class="form-label fw-semibold">Họ và tên</label>
                                        <input type="text" class="form-control custom-input" value="Nguyễn Văn A">
                                    </div>
                                    <div class="col-md-6 mb-4">
                                        <label class="form-label fw-semibold">Email</label>
                                        <input type="email" class="form-control custom-input" value="nguyenvana@email.com">
                                    </div>
                                    <div class="col-md-6 mb-4">
                                        <label class="form-label fw-semibold">Số điện thoại</label>
                                        <input type="tel" class="form-control custom-input" value="+84 901 234 567">
                                    </div>
                                    <div class="col-md-6 mb-4">
                                        <label class="form-label fw-semibold">Địa chỉ</label>
                                        <input type="text" class="form-control custom-input" value="Hà Nội, Việt Nam">
                                    </div>
                                    <div class="col-md-12 mb-4">
                                        <label class="form-label fw-semibold">Giới thiệu</label>
                                        <textarea class="form-control custom-textarea" rows="4">Yêu thích mua sắm tại HaShop với nhiều sản phẩm chất lượng!</textarea>
                                    </div>
                                </div>

                                <div class="d-flex gap-3 mt-4">
                                    <button type="submit" class="btn btn-primary-gradient">
                                        <i class="bi bi-check-circle me-2"></i>Lưu thay đổi
                                    </button>
                                    <a href="profile.html" class="btn btn-outline-light">
                                        <i class="bi bi-x-circle me-2"></i>Hủy
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-minimal">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">HaShop</div>
                <div class="footer-links">
                    <a href="#">Về chúng tôi</a>
                    <a href="#">Chính sách</a>
                    <a href="#">Liên hệ</a>
                    <a href="#">Quy định</a>
                </div>
                <div class="footer-copy">© 2024 HaShop. All rights reserved.</div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('editProfileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Đã cập nhật hồ sơ thành công!');
            window.location.href = 'profile.html';
        });
    </script>
</body>
</html>
