<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaShop - Chỉnh sửa hồ sơ</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/navbar.css">
    <link rel="stylesheet" href="/assets/css/edit-profile.css">
</head>
<body>
    <div id="simple-navbar-placeholder" data-auth-action="login"></div>

    <main class="main-container">
        <div class="profile-wrapper">
            <div class="page-header">
                <a href="/profile" class="back-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 18L9 12L15 6" stroke="#5C3B23" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Quay lại
                </a>
                <h1>Chỉnh sửa hồ sơ</h1>
                <p>Cập nhật thông tin tài khoản của bạn</p>
            </div>

            <div class="profile-card">
                <div id="edit-profile-message" class="message"></div>
                <form id="edit-profile-form">
                    <div class="form-section">
                        <div class="form-row">
                            <div class="form-group full-width">
                                <label for="edit-name">Họ tên</label>
                                <input type="text" id="edit-name">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="edit-email">Email</label>
                                <input type="email" id="edit-email" disabled>
                            </div>
                            <div class="form-group">
                                <label for="edit-phone">Số điện thoại</label>
                                <input type="tel" id="edit-phone">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="edit-birthday">Ngày sinh</label>
                                <input type="date" id="edit-birthday" disabled>
                            </div>
                            <div class="form-group">
                                <label for="edit-gender">Giới tính</label>
                                <select id="edit-gender" disabled>
                                    <option value="male">Nam</option>
                                    <option value="female">Nữ</option>
                                    <option value="other">Khác</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group full-width">
                                <label for="edit-address">Địa chỉ</label>
                                <textarea id="edit-address" rows="3"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <a href="/profile" class="btn btn-secondary">Hủy</a>
                        <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/simple-navbar.js"></script>
    <script src="/assets/js/edit-profile.js"></script>
</body>
</html>
