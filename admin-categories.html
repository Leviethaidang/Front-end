<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HaShop - Admin Categories</title>

    <link rel="stylesheet" href="/assets/css/common.css">
    <link rel="stylesheet" href="/assets/css/navbar.css">
    <link rel="stylesheet" href="/assets/css/admin-categories.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="container">
        <div class="page-header">
            <h2>Admin - Quản lý danh mục</h2>
            <p>Thêm, sửa, xóa danh mục sản phẩm.</p>
        </div>

        <p id="message" class="message"></p>

        <div class="box">
            <h3>Thêm danh mục mới</h3>

            <div class="form-row">
                <input
                    id="newCategoryName"
                    placeholder="Tên danh mục, ví dụ: Quần jean"
                >

                <button id="createCategoryBtn" class="btn btn-green">
                    Tạo danh mục
                </button>
            </div>
        </div>

        <div class="table-section">
            <h3>Danh sách danh mục</h3>

            <table>
                <thead>
                    <tr>
                        <th>Category ID</th>
                        <th>Tên danh mục</th>
                        <th>Ngày tạo</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>

                <tbody id="categoryTableBody">
                    <tr>
                        <td colspan="4">Đang tải...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/navbar.js"></script>
    <script src="/assets/js/admin-categories.js"></script>
</body>
</html>
