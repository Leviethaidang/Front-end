<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaShop - Đăng nhập</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/assets/css/common.css">
    <link rel="stylesheet" href="/assets/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="left-section">
            <nav class="top-nav">
                <a class="brand-name" href="/">HaShop</a>
                <div class="top-nav-links">
                    <a href="/">Sản phẩm</a>
                    <a href="#">Ưu đãi</a>
                    <a href="#">Đánh giá</a>
                    <a href="/register" class="btn-signup">Đăng ký</a>
                </div>
            </nav>
            <div class="left-content">
                <h1 class="left-title">Mua sắm thông minh.</h1>
                <p class="left-subtitle">Tham gia cộng đồng HaShop để trải nghiệm mua sắm hiện đại, tiết kiệm và an toàn.</p>
            </div>
        </div>

        <div class="right-section">
            <div class="form-wrapper">
                <div class="form-header">
                    <h2 class="form-title">Chào mừng trở lại</h2>
                    <p class="form-subtitle">Đăng nhập tài khoản HaShop của bạn để tiếp tục.</p>
                </div>

                <form id="login-form">
                    <div class="mb-4">
                        <label class="form-label fw-semibold" for="login-email">Địa chỉ email</label>
                        <div class="input-icon-wrapper">
                            <i class="bi bi-envelope"></i>
                            <input id="login-email" type="email" class="form-control custom-input" placeholder="email@example.com">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold" for="login-password">Mật khẩu</label>
                        <div class="input-icon-wrapper">
                            <i class="bi bi-lock"></i>
                            <input id="login-password" type="password" class="form-control custom-input" placeholder="Mật khẩu">
                        </div>
                    </div>

                    <button id="login-button" type="submit" class="btn btn-primary-gradient w-100 py-3 fw-semibold">
                        Đăng nhập
                    </button>
                </form>

                <div id="login-message" class="message"></div>

                <div class="text-center mt-4">
                    <p class="mb-0">
                        Chưa có tài khoản? <a href="/register" class="signup-link">Đăng ký ngay</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="/assets/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/common.js"></script>
    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/login.js"></script>
</body>
</html>
