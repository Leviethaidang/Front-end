<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaShop - Đăng nhập</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/navbar.css">
    <link rel="stylesheet" href="/assets/css/login.css">
</head>
<body>
    <div id="simple-navbar-placeholder" data-auth-action="register"></div>

    <main class="main-container">
        <div class="left-section">
            <div class="overlay"></div>
            <div class="text-content">
                <h1 class="brand-title">HASHOP</h1>
                <h2 class="brand-subtitle">THỜI TRANG CHO MỌI PHONG CÁCH</h2>
                <p class="brand-description">Khám phá những bộ sưu tập mới nhất với thiết kế hiện đại và trải nghiệm mua sắm tiện lợi.</p>
            </div>
        </div>
        
        <div class="right-section">
            <div class="form-wrapper">
                <h2 class="form-title">Chào mừng trở lại</h2>
                <p class="form-subtitle">Đăng nhập để tiếp tục mua sắm tại HaShop.</p>
                
                <form id="login-form">
                    <div class="input-group">
                        <span class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M20 4H4C2.9 4 2 4.9 2 6V18C2 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V6C22 4.9 21.1 4 20 4Z" stroke="#8B5E3C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M22 6L12 13L2 6" stroke="#8B5E3C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>
                        <input id="login-email" type="email" placeholder="Email">
                    </div>
                    
                    <div class="input-group">
                        <span class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M19 11H5C3.89543 11 3 11.8954 3 13V20C3 21.1046 3.89543 22 5 22H19C20.1046 22 21 21.1046 21 20V13C21 11.8954 20.1046 11 19 11Z" stroke="#8B5E3C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M7 11V7C7 5.67392 7.52678 4.40215 8.46447 3.46447C9.40215 2.52678 10.6739 2 12 2C13.3261 2 14.5979 2.52678 15.5355 3.46447C16.4732 4.40215 17 5.67392 17 7V11" stroke="#8B5E3C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>
                        <input id="login-password" type="password" placeholder="Mật khẩu">
                        <span class="password-toggle" data-target="login-password">
                            <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="#8B5E3C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                            <svg class="eye-on" style="display:none" viewBox="0 0 24 24" fill="none" stroke="#8B5E3C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </span>
                    </div>
                    
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox">
                            <span>Ghi nhớ đăng nhập</span>
                        </label>
                        <a href="#" class="forgot-password">Quên mật khẩu</a>
                    </div>
                    
                    <button id="login-button" type="submit" class="submit-btn">
                        Đăng nhập
                    </button>
                </form>
                
                <div id="login-message" class="message"></div>
                
                <div class="small-text">
                    Chưa có tài khoản?
                    <a href="/register">Đăng ký ngay</a>
                </div>
            </div>
        </div>
    </main>

    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/simple-navbar.js"></script>
    <script src="/assets/js/login.js"></script>
</body>
</html>
