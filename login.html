<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HaShop - Đăng nhập</title>
    
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="/assets/font/bootstrap-icons-1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .message {
            margin-top: 15px;
            font-size: 14px;
            color: #d70018;
        }
        .message.success {
            color: #198754;
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <main>
        <section class="mt-100 login-section mb-100">
           <div class="container">
              <div class="row justify-content-center">
                 <div class="col-lg-5 col-md-8 col-sm-12 col-12 mb-lg-0 mb-md-4 mb-sm-4 mb-4">
                    <div class="item border p-4 rounded shadow-sm">
                        <div class="mb-4 text-center">
                            <h2>Đăng nhập</h2>
                            <p class="text-muted">Đăng nhập tài khoản của bạn để trải nghiệm tốt nhất.</p>
                        </div>
                        <form id="login-form">
                            <div class="row g-3">
                                <div class="col-12">
                                    <label for="login-email" class="form-label">Email<span class="text-danger">*</span></label>
                                    <input type="email" class="form-control bg-light border-0 py-2" id="login-email" placeholder="Nhập email" required>
                                </div>
                                <div class="col-12">
                                    <label for="login-password" class="form-label">Mật khẩu<span class="text-danger">*</span></label>
                                    <input type="password" class="form-control bg-light border-0 py-2" id="login-password" placeholder="Nhập mật khẩu" required>
                                </div>
                                <div class="col-12 mt-4">
                                    <button type="submit" id="login-button" class="btn btn-primary px-4 w-100 py-2">Đăng nhập</button>
                                </div>
                                
                                <div id="login-message" class="message text-center w-100"></div>

                                <div class="col-12 text-center mt-3">
                                    Chưa có tài khoản? <a href="/register" class="text-primary">Đăng ký ngay</a>
                                </div>
                            </div>
                        </form>
                    </div>
                 </div>
              </div>
           </div>
        </section>
     </main>

    <div id="footer-placeholder"></div>

    <script src="/assets/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/common.js"></script>
    <script src="/assets/js/navbar.js"></script>
    <script src="/assets/js/login.js"></script>
    <script src="/assets/js/footer.js"></script>
</body>
</html>
