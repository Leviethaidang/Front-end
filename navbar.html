<header class="navigation shadow-sm border-bottom glass-nav">
  <div class="navbar-sticky">
      <div class="navbar navbar-middle navbar-expand-lg mt-lg-3 ">
          <div class="container">
              <a class="navbar-brand flex-shrink-0 " href="/">
                  <img src="/assets/images/LogoNhoHaShop.png" class="logo main-logo" alt="HaShop" style="height: 40px; display: block;">
              </a>
              <div class="input-group d-none d-lg-flex me-5 position-relative" style="max-width: 400px;">
                  <input id="searchInput" class="form-control py-10 px-20 modern-input" type="text" placeholder="Tìm kiếm sản phẩm...">
                  <button type="button" class="btn btn-brand-gradient d-none d-lg-block hover-lift" id="btnSearch">Tìm kiếm</button>
                  
                  <!-- Dropdown gợi ý tìm kiếm -->
                  <div id="search-suggestions" class="dropdown-menu w-100 shadow-sm border-0" style="position: absolute; top: 100%; left: 0; z-index: 1000; max-height: 400px; overflow-y: auto; display: none;">
                      <!-- Gợi ý được render bằng JS -->
                  </div>
              </div>
              
              <div class="list-inline d-flex" id="navbar-auth-section">
                  <!-- Dynamic auth content here -->
              </div>
          </div>
      </div>
      <nav class="navbar navbar-expand-lg navbar-light navbar-default py-lg-2 py-md-0 py-0 py-sm-0 bg-color mt-lg-3" aria-label="Offcanvas navbar large">
          <div class="container">
              <div class="offcanvas offcanvas-start" tabindex="-1" id="navbar-default" aria-labelledby="navbar-defaultLabel">
                  <div class="offcanvas-header pb-1">
                      <a href="/"><img src="/assets/images/LogoNhoHaShop.png" class="logo" alt="HaShop" style="height: 40px;"></a>
                      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                  </div>
                  <div class="offcanvas-body">
                      <div class="d-block d-lg-none mb-4">
                          <div class="input-group me-5 position-relative">
                              <input id="searchInputMobile" class="form-control py-10 px-20 modern-input" type="text" placeholder="Tìm kiếm...">
                              <button type="button" class="btn btn-brand-gradient hover-lift" id="btnSearchMobile">Tìm</button>
                              
                              <div id="search-suggestions-mobile" class="dropdown-menu w-100 shadow-sm border-0" style="position: absolute; top: 100%; left: 0; z-index: 1000; max-height: 300px; overflow-y: auto; display: none;">
                                  <!-- Gợi ý được render bằng JS -->
                              </div>
                          </div>
                      </div>
                      <div>
                          <ul class="navbar-nav align-items-center" id="dynamic-category-menu">
                              <!-- Menu categories 2 cấp sẽ được JS render ở đây -->
                          </ul>
                      </div>
                      <div id="mobile-auth-section" class="d-block d-lg-none mt-4">
                           <!-- Dynamic mobile auth content here -->
                      </div>
                  </div>
              </div>
          </div>
      </nav>
  </div>
</header>
