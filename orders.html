<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaShop - Đơn hàng của tôi</title>
    <meta name="description" content="Theo dõi và quản lý toàn bộ đơn hàng của bạn tại HaShop.">
    
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="/assets/font/bootstrap-icons-1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <main>
        <section class="mt-50 mb-100">
            <div class="container">
                <div class="row mb-4">
                    <div class="col-12 text-center">
                        <h1 class="page-title mb-2">Đơn hàng của tôi</h1>
                        <p class="text-muted">Theo dõi trạng thái và lịch sử đặt hàng</p>
                    </div>
                </div>

                <div id="message" class="text-center mb-4"></div>

                <div class="row">
                    <div class="col-12">
                        <div id="orders-content" class="loading text-center py-5">
                            <div class="spinner-border text-success" role="status">
                                <span class="visually-hidden">Đang tải danh sách đơn hàng...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/assets/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/common.js"></script>
    <script src="/assets/js/navbar.js"></script>
    <script src="/assets/js/orders.js"></script>
    <script src="/assets/js/footer.js"></script>
</body>
</html>
