<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaShop - Admin Users</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/common.css">
    <link rel="stylesheet" href="assets/css/navbar.css">
    <link rel="stylesheet" href="assets/css/admin-users.css">
    <link rel="stylesheet" href="assets/css/admin-common.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="container">
        <div class="page-header">
            <h2>Admin - Quản lý người dùng</h2>
            <p>Tạo, cập nhật, vô hiệu hóa hoặc xóa tài khoản người dùng.</p>
        </div>

        <p id="message" class="message"></p>

        <div class="box">
            <h3>Thêm user mới</h3>

            <input id="newFullName" placeholder="Họ và tên">

            <input id="newEmail" type="email" placeholder="Email">

            <input id="newPhone" placeholder="Số điện thoại, ví dụ +84901234567">

            <input id="newPassword" type="password" placeholder="Mật khẩu">

            <textarea id="newAddress" placeholder="Địa chỉ giao hàng"></textarea>

            <select id="newGroup">
                <option value="Customer">Customer</option>
                <option value="Admin">Admin</option>
            </select>

            <button id="createUserBtn" class="btn btn-green">
                Tạo user
            </button>
        </div>

        <div class="table-section">
            <h3>Danh sách users</h3>

            <table>
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Họ tên</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Địa chỉ</th>
                        <th>Status</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>

                <tbody id="userTableBody">
                    <tr>
                        <td colspan="7">Đang tải...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/navbar.js"></script>
    <script src="assets/js/admin-users.js"></script>
</body>
</html>
