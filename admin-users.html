<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HaShop - Admin Users</title>

    <link rel="stylesheet" href="/assets/css/navbar.css">
    <link rel="stylesheet" href="/assets/css/admin-common.css">
    <link rel="stylesheet" href="/assets/css/admin-layout.css">
    <link rel="stylesheet" href="/assets/css/admin-users.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="container">
        <div class="page-header">
            <h2>Admin - Quản lý người dùng</h2>
            <p>Tạo, cập nhật, vô hiệu hóa hoặc xóa tài khoản người dùng.</p>
        </div>

        <p id="message" class="message"></p>

        <div class="box">
            <h3>Thêm user mới</h3>

            <input id="newFullName" placeholder="Họ và tên">

            <input id="newEmail" type="email" placeholder="Email">

            <input id="newPhone" placeholder="Số điện thoại, ví dụ +84901234567">

            <input id="newPassword" type="password" placeholder="Mật khẩu">

            <textarea id="newAddress" placeholder="Địa chỉ giao hàng"></textarea>

            <select id="newGroup">
                <option value="Customer">Customer</option>
                <option value="Admin">Admin</option>
            </select>

            <button id="createUserBtn" class="btn btn-green">
                Tạo user
            </button>
        </div>

        <div class="table-section">
            <div class="section-head">
                <h3>Danh sách users</h3>
                <span class="section-note">Lọc nhanh theo tên, email, số điện thoại, địa chỉ hoặc trạng thái.</span>
            </div>

            <div class="filter-bar section-filter-bar">
                <div class="filter-group">
                    <span class="filter-label">Tìm kiếm</span>
                    <input
                        id="userSearchInput"
                        class="filter-input"
                        placeholder="Tên, email, số điện thoại, địa chỉ..."
                    >
                </div>

                <div class="filter-group">
                    <span class="filter-label">Trạng thái</span>
                    <select id="userStatusFilter" class="filter-select">
                        <option value="">Tất cả</option>
                        <option value="ACTIVE">ACTIVE</option>
                        <option value="DISABLED">DISABLED</option>
                    </select>
                </div>

                <button id="resetUserFiltersBtn" type="button" class="filter-btn-reset">
                    Xóa lọc
                </button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Họ tên</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Địa chỉ</th>
                        <th>Status</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>

                <tbody id="userTableBody">
                    <tr>
                        <td colspan="7">Đang tải...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/navbar.js"></script>
    <script src="/assets/js/admin-users.js"></script>
</body>
</html>
