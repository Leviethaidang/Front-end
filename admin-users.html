<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaShop - Admin Users</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/common.css">
    <link rel="stylesheet" href="assets/css/navbar.css">
    <link rel="stylesheet" href="assets/css/admin-users.css">
    <link rel="stylesheet" href="assets/css/admin-common.css">
    <link rel="stylesheet" href="assets/css/admin-layout.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="admin-sidebar">
            <div class="admin-sidebar-header">
                <h3>Chức năng</h3>
            </div>
            <ul class="sidebar-menu">
                <li class="sidebar-menu-item">
                    <button class="sidebar-menu-btn" data-target="section-create-user">
                        <i class="bi bi-plus-circle"></i>
                        Thêm User
                    </button>
                </li>
                <li class="sidebar-menu-item">
                    <button class="sidebar-menu-btn" data-target="section-list-users">
                        <i class="bi bi-list-ul"></i>
                        Danh sách Users
                    </button>
                </li>
                <li class="sidebar-menu-item">
                    <button class="sidebar-menu-btn" data-target="section-filter-users">
                        <i class="bi bi-funnel"></i>
                        Bộ lọc
                    </button>
                </li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="admin-content">
            <div class="admin-page-header">
                <h1>Quản lý người dùng</h1>
                <p>Tạo, cập nhật, vô hiệu hóa hoặc xóa tài khoản người dùng.</p>
            </div>

            <p id="message" class="message"></p>

            <!-- Section: Thêm User -->
            <section id="section-create-user" class="section-container active">
                <div class="box">
                    <h3>Thêm User mới</h3>

                    <input id="newFullName" placeholder="Họ và tên">
                    <input id="newEmail" type="email" placeholder="Email">
                    <input id="newPhone" placeholder="Số điện thoại, ví dụ +84901234567">
                    <input id="newPassword" type="password" placeholder="Mật khẩu">
                    <textarea id="newAddress" placeholder="Địa chỉ giao hàng"></textarea>

                    <select id="newGroup">
                        <option value="Customer">Customer</option>
                        <option value="Admin">Admin</option>
                    </select>

                    <button id="createUserBtn" class="btn btn-green">
                        <i class="bi bi-check-circle me-2"></i>Tạo user
                    </button>
                </div>
            </section>

            <!-- Section: Danh sách Users -->
            <section id="section-list-users" class="section-container">
                <div class="filter-bar">
                    <div class="filter-group">
                        <label class="filter-label">Tìm kiếm:</label>
                        <input type="text" class="filter-input" id="filterSearchUsers" placeholder="Email hoặc tên...">
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Trạng thái:</label>
                        <select class="filter-select" id="filterStatusUsers">
                            <option value="">Tất cả</option>
                            <option value="ACTIVE">Kích hoạt</option>
                            <option value="DISABLED">Vô hiệu hóa</option>
                        </select>
                    </div>
                    <button class="filter-btn" id="applyFilterUsersBtn">
                        <i class="bi bi-search"></i> Tìm kiếm
                    </button>
                    <button class="filter-btn-reset" id="resetFilterUsersBtn">
                        <i class="bi bi-arrow-clockwise"></i> Reset
                    </button>
                </div>

                <div class="table-section">
                    <h3>Danh sách Users</h3>

                    <table>
                        <thead>
                            <tr>
                                <th>User ID</th>
                                <th>Họ tên</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Địa chỉ</th>
                                <th>Status</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>

                        <tbody id="userTableBody">
                            <tr>
                                <td colspan="7">Đang tải...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Section: Bộ lọc nâng cao -->
            <section id="section-filter-users" class="section-container">
                <div class="box">
                    <h3>Bộ lọc nâng cao</h3>

                    <label class="form-label">Tìm theo tên:</label>
                    <input type="text" id="advFilterName" placeholder="Nhập tên người dùng...">

                    <label class="form-label">Tìm theo email:</label>
                    <input type="email" id="advFilterEmail" placeholder="Nhập email...">

                    <label class="form-label">Tìm theo số điện thoại:</label>
                    <input type="text" id="advFilterPhone" placeholder="Nhập số điện thoại...">

                    <label class="form-label">Trạng thái:</label>
                    <select id="advFilterStatus">
                        <option value="">-- Tất cả --</option>
                        <option value="ACTIVE">Kích hoạt</option>
                        <option value="DISABLED">Vô hiệu hóa</option>
                    </select>

                    <label class="form-label">Vai trò:</label>
                    <select id="advFilterRole">
                        <option value="">-- Tất cả --</option>
                        <option value="Admin">Admin</option>
                        <option value="Customer">Customer</option>
                    </select>

                    <div style="display: flex; gap: 12px; margin-top: 20px;">
                        <button class="btn btn-green" id="advApplyFilterBtn">
                            <i class="bi bi-search"></i> Áp dụng bộ lọc
                        </button>
                        <button class="btn btn-blue" id="advResetFilterBtn">
                            <i class="bi bi-arrow-clockwise"></i> Đặt lại
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/navbar.js"></script>
    <script src="assets/js/admin-sidebar.js"></script>
    <script src="assets/js/admin-users.js"></script>
</body>
</html>
